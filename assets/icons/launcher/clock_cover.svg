<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 110 110" width="110" height="110">
  <!-- Outer Dark Frame (Muted Charcoal) -->
  <circle cx="55" cy="55" r="52" fill="#1e1e24" stroke="#5f5f7d" stroke-width="2.5" />
  
  <!-- Faded Chess Bishop Silhouette in Center Background -->
  <g fill="#2d2d38" opacity="0.45">
    <!-- Bishop Mitre/Head -->
    <path d="M 55,28 C 45,35 46,55 55,68 C 64,55 65,35 55,28 Z" />
    <!-- Slit in the Bishop Head -->
    <path d="M 53,30 L 49,38" stroke="#1e1e24" stroke-width="1.5" stroke-linecap="round" />
    <!-- Small Top Ball -->
    <circle cx="55" cy="26" r="2.5" />
    <!-- Bishop Collar/Base -->
    <path d="M 45,68 C 45,68 43,72 55,72 C 67,72 65,68 65,68 Z" />
    <rect x="42" y="73" width="26" height="4" rx="1.5" />
  </g>

  <!-- Circular Dial Ring (Soft Inner Guide) -->
  <circle cx="55" cy="55" r="44" fill="none" stroke="#3b3b4a" stroke-width="1.5" stroke-dasharray="3, 3" />

  <!-- Clean Hour Ticks (12, 3, 6, 9) -->
  <line x1="55" y1="11" x2="55" y2="17" stroke="#7f7f9d" stroke-width="2" stroke-linecap="round" />
  <line x1="99" y1="55" x2="93" y2="55" stroke="#7f7f9d" stroke-width="2" stroke-linecap="round" />
  <line x1="55" y1="99" x2="55" y2="93" stroke="#7f7f9d" stroke-width="2" stroke-linecap="round" />
  <line x1="11" y1="55" x2="17" y2="55" stroke="#7f7f9d" stroke-width="2" stroke-linecap="round" />

  <!-- Subtler Intermediate Hour Ticks (1, 2, 4, 5, 7, 8, 10, 11) -->
  <line x1="77" y1="16.8" x2="74" y2="22" stroke="#5f5f7d" stroke-width="1" />
  <line x1="93.2" y1="33" x2="88" y2="36" stroke="#5f5f7d" stroke-width="1" />
  <line x1="93.2" y1="77" x2="88" y2="74" stroke="#5f5f7d" stroke-width="1" />
  <line x1="77" y1="93.2" x2="74" y2="88" stroke="#5f5f7d" stroke-width="1" />
  <line x1="33" y1="93.2" x2="36" y2="88" stroke="#5f5f7d" stroke-width="1" />
  <line x1="16.8" y1="77" x2="22" y2="74" stroke="#5f5f7d" stroke-width="1" />
  <line x1="16.8" y1="33" x2="22" y2="36" stroke="#5f5f7d" stroke-width="1" />
  <line x1="33" y1="16.8" x2="36" y2="22" stroke="#5f5f7d" stroke-width="1" />
</svg>
